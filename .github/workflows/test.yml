name: Unit Tests

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'classifier/**'
  pull_request:
    branches:
      - main
      - dev
    paths-ignore:
      - 'classifier/**'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
